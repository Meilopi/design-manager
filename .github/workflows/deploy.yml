name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab — useful to redeploy from any branch
  # while the feature branch isn't merged to main yet.
  workflow_dispatch:

# Never run two deploys in parallel; let the second one wait so it doesn't
# overwrite workers mid-upload. Don't cancel in-progress deploys.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest

    # Surfaces this deploy on the repo's Deployments page and lets us
    # attach protection rules (required reviewers, wait timer) later.
    environment:
      name: production
      url: https://design-manager-api.siddur.workers.dev

    env:
      # Set in repo Settings → Secrets and variables → Actions.
      # The token needs Workers + D1 + KV + R2 + Queues (+ Access) Edit.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Optional; deploy.mjs auto-discovers via /memberships if absent.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Deploy all to Cloudflare
        run: pnpm deploy:all

      - name: Smoke test /healthz
        run: |
          set -euo pipefail
          URL="https://design-manager-api.siddur.workers.dev/healthz"
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            if [ "$code" = "200" ]; then
              echo "healthz ok"
              exit 0
            fi
            echo "attempt $i: got $code — retrying in 2s"
            sleep 2
          done
          echo "healthz never returned 200"
          exit 1
