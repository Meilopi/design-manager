name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab — useful to redeploy from any branch
  # while the feature branch isn't merged to main yet.
  workflow_dispatch:

# Never run two deploys in parallel; let the second one wait so it doesn't
# overwrite workers mid-upload. Don't cancel in-progress deploys.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest

    # Surfaces this deploy on the repo's Deployments page and lets us
    # attach protection rules (required reviewers, wait timer) later.
    environment:
      name: production
      url: https://dm.lopiansky.org

    env:
      # Set in repo Settings → Secrets and variables → Actions.
      # The token needs Workers + D1 + KV + R2 + Queues (+ Access) Edit.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Optional; deploy.mjs auto-discovers via /memberships if absent.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Deploy all to Cloudflare
        run: pnpm deploy:all

      - name: Smoke test — Access is gating dm.lopiansky.org
        run: |
          set -euo pipefail
          URL="https://dm.lopiansky.org/"
          for i in 1 2 3 4 5; do
            response=$(curl -sI "$URL" || true)
            code=$(printf '%s' "$response" | awk 'NR==1 {print $2}')
            location=$(printf '%s' "$response" | awk 'tolower($1)=="location:" {print $2}' | tr -d '\r\n')
            if [ "$code" = "302" ] && printf '%s' "$location" | grep -q "cloudflareaccess.com/cdn-cgi/access/login"; then
              echo "OK — Access is gating (302 → $location)"
              exit 0
            fi
            echo "attempt $i: code=$code location=$location — retrying in 3s"
            sleep 3
          done
          echo "dm.lopiansky.org did not return the expected Access redirect"
          exit 1
