name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab — useful to redeploy from any branch
  # while the feature branch isn't merged to main yet.
  workflow_dispatch:

# Never run two deploys in parallel; let the second one wait so it doesn't
# overwrite workers mid-upload. Don't cancel in-progress deploys.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest

    # Surfaces this deploy on the repo's Deployments page and lets us
    # attach protection rules (required reviewers, wait timer) later.
    environment:
      name: production
      url: https://dm.lopiansky.org

    env:
      # Set in repo Settings → Secrets and variables → Actions.
      # The token needs Workers + D1 + KV + R2 + Queues (+ Access) Edit.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Optional; deploy.mjs auto-discovers via /memberships if absent.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Deploy all to Cloudflare
        run: pnpm deploy:all

      # Strong end-to-end check: present the design-manager-ci Access
      # Service Token, Access validates at the edge, our Worker's middleware
      # validates the minted JWT against the team JWKS, and the /v1/captures
      # GET returns 200 with a jobs list. This exercises DNS + TLS + Access
      # gating + JWT verification + RBAC in one request.
      - name: Smoke test — Access + Service Token end-to-end
        env:
          CF_ACCESS_CLIENT_ID:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CF_ACCESS_CLIENT_ID:-}" ] || [ -z "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
            echo "::error::CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET repo secrets are required"
            exit 1
          fi
          URL="https://dm.lopiansky.org/v1/captures"
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              "$URL" || echo 000)
            if [ "$code" = "200" ]; then
              echo "OK — Access + Service Token end-to-end"
              exit 0
            fi
            echo "attempt $i: $code — retrying in 3s"
            sleep 3
          done
          echo "Smoke test never reached 200"
          exit 1
